services:
  gateway-service:
    build:
      context: ../..
      dockerfile: services/gateway-service/Dockerfile
    container_name: sc-gateway-service
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "8000:8000"
    volumes:
      - ../../services/gateway-service/configs/config.yaml:/app/configs/config.yaml:ro
    networks:
      - smart-community
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  user-service:
    build:
      context: ../..
      dockerfile: services/user-service/Dockerfile
    container_name: sc-user-service
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "8001:8001"
    volumes:
      - ../../services/user-service/configs/config.yaml:/app/configs/config.yaml:ro
    networks:
      - smart-community
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  mall-service:
    build:
      context: ../..
      dockerfile: services/mall-service/Dockerfile
    container_name: sc-mall-service
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "8002:8002"
    volumes:
      - ../../services/mall-service/configs/config.yaml:/app/configs/config.yaml:ro
    networks:
      - smart-community
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  community-service:
    build:
      context: ../..
      dockerfile: services/community-service/Dockerfile
    container_name: sc-community-service
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "8003:8003"
    volumes:
      - ../../services/community-service/configs/config.yaml:/app/configs/config.yaml:ro
    networks:
      - smart-community
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8003/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  agent-service:
    build:
      context: ../..
      dockerfile: services/agent-service/Dockerfile
    container_name: sc-agent-service
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      LLM_API_KEY: ""
      LLM_BASE_URL: ""
      LLM_MODEL: ""
      USER_SERVICE_URL: http://user-service:8001
      MALL_SERVICE_URL: http://mall-service:8002
      COMMUNITY_SERVICE_URL: http://community-service:8003
      WORKORDER_SERVICE_URL: http://community-service:8003
      STATISTICS_SERVICE_URL: http://community-service:8003
    ports:
      - "9100:9000"
    networks:
      - smart-community
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  smart-community:
    driver: bridge
