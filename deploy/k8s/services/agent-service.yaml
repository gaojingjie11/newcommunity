apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-service
  namespace: smart-community
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-service
  template:
    metadata:
      labels:
        app: agent-service
    spec:
      containers:
        - name: agent-service
          image: smartcommunity/agent-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: smart-community-dev-secrets
                  key: LLM_API_KEY
          ports:
            - containerPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: agent-service
  namespace: smart-community
spec:
  selector:
    app: agent-service
  ports:
    - port: 9000
      targetPort: 9000
