apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: smart-community
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
        - name: gateway-service
          image: smartcommunity/gateway-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: smart-community
spec:
  selector:
    app: gateway-service
  ports:
    - port: 8000
      targetPort: 8000
