apiVersion: apps/v1
kind: Deployment
metadata:
  name: community-service
  namespace: smart-community
spec:
  replicas: 1
  selector:
    matchLabels:
      app: community-service
  template:
    metadata:
      labels:
        app: community-service
    spec:
      containers:
        - name: community-service
          image: smartcommunity/community-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8003
---
apiVersion: v1
kind: Service
metadata:
  name: community-service
  namespace: smart-community
spec:
  selector:
    app: community-service
  ports:
    - port: 8003
      targetPort: 8003
