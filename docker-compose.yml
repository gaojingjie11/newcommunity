version: '3.8'

services:
  # User RPC Service
  user-rpc:
    build:
      context: .
      dockerfile: app/user/rpc/Dockerfile
    container_name: sc-user-rpc
    restart: always
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "10001:9001"
    networks:
      - smart-network

  # Mall RPC Service
  mall-rpc:
    build:
      context: .
      dockerfile: app/mall/rpc/Dockerfile
    container_name: sc-mall-rpc
    restart: always
    environment:
      - TZ=Asia/Shanghai
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_ADDRESS=${SMTP_FROM_ADDRESS}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME}
      - SMTP_USE_TLS=${SMTP_USE_TLS}
    ports:
      - "10002:9002"
    networks:
      - smart-network

  # Community RPC Service
  community-rpc:
    build:
      context: .
      dockerfile: app/community/rpc/Dockerfile
    container_name: sc-community-rpc
    restart: always
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "10003:9003"
    networks:
      - smart-network

  # Workorder RPC Service
  workorder-rpc:
    build:
      context: .
      dockerfile: app/workorder/rpc/Dockerfile
    container_name: sc-workorder-rpc
    restart: always
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "10004:9004"
    networks:
      - smart-network

  # Stats RPC Service
  stats-rpc:
    build:
      context: .
      dockerfile: app/stats/rpc/Dockerfile
    container_name: sc-stats-rpc
    restart: always
    environment:
      - TZ=Asia/Shanghai
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL=${LLM_MODEL}
    ports:
      - "10005:9005"
    networks:
      - smart-network

  # Gateway API Service
  gateway-api:
    build:
      context: .
      dockerfile: app/gateway/api/Dockerfile
    container_name: sc-gateway-api
    restart: always
    environment:
      - TZ=Asia/Shanghai
      - LLM_IMAGE_VISION_API_KEY=${LLM_IMAGE_VISION_API_KEY}
      - LLM_IMAGE_VISION_BASE_URL=${LLM_IMAGE_VISION_BASE_URL}
      - LLM_IMAGE_VISION_MODEL=${LLM_IMAGE_VISION_MODEL}
      - MINIO_PUBLIC_URL=https://api.communitysvc.xyz/minio
    ports:
      - "10000:8000"
    networks:
      - smart-network
    depends_on:
      - user-rpc
      - mall-rpc
      - community-rpc
      - workorder-rpc
      - stats-rpc
      - agent-rpc

  # Agent RPC Service (Go/Eino)
  agent-rpc:
    build:
      context: .
      dockerfile: app/agent/rpc/Dockerfile
    container_name: sc-agent-rpc
    restart: always
    environment:
      - TZ=Asia/Shanghai
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL=${LLM_MODEL}
      - LLM_CHAT_DEFAULT_API_KEY=${LLM_CHAT_DEFAULT_API_KEY}
      - LLM_CHAT_DEFAULT_BASE_URL=${LLM_CHAT_DEFAULT_BASE_URL}
      - LLM_CHAT_DEFAULT_MODEL=${LLM_CHAT_DEFAULT_MODEL}
      - LLM_AGENT_REASONING_API_KEY=${LLM_AGENT_REASONING_API_KEY}
      - LLM_AGENT_REASONING_BASE_URL=${LLM_AGENT_REASONING_BASE_URL}
      - LLM_AGENT_REASONING_MODEL=${LLM_AGENT_REASONING_MODEL}
      - ARK_API_KEY=${ARK_API_KEY}
      - ARK_BASE_URL=${ARK_BASE_URL}
      - ARK_EMBEDDING_MODEL=${ARK_EMBEDDING_MODEL}
      - LLM_IMAGE_VISION_API_KEY=${LLM_IMAGE_VISION_API_KEY}
      - LLM_IMAGE_VISION_BASE_URL=${LLM_IMAGE_VISION_BASE_URL}
      - LLM_IMAGE_VISION_MODEL=${LLM_IMAGE_VISION_MODEL}
      - LLM_ASR_API_KEY=${LLM_ASR_API_KEY}
      - LLM_ASR_BASE_URL=${LLM_ASR_BASE_URL}
      - LLM_ASR_MODEL=${LLM_ASR_MODEL}
      - LLM_TTS_API_KEY=${LLM_TTS_API_KEY}
      - LLM_TTS_BASE_URL=${LLM_TTS_BASE_URL}
      - LLM_TTS_MODEL=${LLM_TTS_MODEL}
    ports:
      - "10006:9006"
    networks:
      - smart-network

  # Frontend Service (Vue + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sc-frontend
    restart: always
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "90:81"
    networks:
      - smart-network
    depends_on:
      - gateway-api

networks:
  smart-network:
    driver: bridge
