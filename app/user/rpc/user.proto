syntax = "proto3";

package user;

option go_package = "./user";

message BaseResp {
  int32 code = 1;
  string message = 2;
}

message EmptyReq {}

message UserIDReq {
  int64 user_id = 1;
}

message RegisterReq {
  string mobile = 1;
  string password = 2;
}

message RegisterResp {
  int64 user_id = 1;
}

message LoginReq {
  string mobile = 1;
  string password = 2;
  string client_ip = 3;
  string user_agent = 4;
}

message LoginByCodeReq {
  string mobile = 1;
  string code = 2;
  string client_ip = 3;
  string user_agent = 4;
}

message LoginResp {
  string token = 1;
  UserInfo user_info = 2;
  bool is_new_user = 3;
  bool profile_completed = 4;
}

message UserInfo {
  int64 id = 1;
  string username = 2;
  string real_name = 3;
  string mobile = 4;
  string avatar = 5;
  int32 green_points = 6;
  string role = 7;
  int32 status = 8;
  bool face_registered = 9;
  string face_image_url = 10;
  double balance = 11;
  string role_name = 12;
}

message SendCodeReq {
  string mobile = 1;
}

message ResetPasswordReq {
  string mobile = 1;
  string code = 2;
  string new_password = 3;
}

message ChangePasswordReq {
  int64 user_id = 1;
  string old_password = 2;
  string new_password = 3;
}

message UpdateProfileReq {
  int64 user_id = 1;
  optional string avatar = 2;
  optional string mobile = 3;
  optional string username = 4;
  optional int32 gender = 5;
  optional string email = 6;
  optional string real_name = 7;
  optional int32 age = 8;
}

message RegisterFaceReq {
  int64 user_id = 1;
  string face_image_url = 2;
}

message CheckTokenReq {
  string token = 1;
}

message CheckTokenResp {
  int64 user_id = 1;
  string role = 2;
}

message PermissionListResp {
  repeated string permissions = 1;
}

message Role {
  int64 id = 1;
  string name = 2;
  string code = 3;
  string remark = 4;
}

message RoleListResp {
  repeated Role roles = 1;
}

message CreateRoleReq {
  string name = 1;
  string code = 2;
  string remark = 3;
}

message UpdateRoleReq {
  int64 id = 1;
  string name = 2;
  string code = 3;
  string remark = 4;
}

message DeleteRoleReq {
  int64 id = 1;
}

message BindRoleMenuReq {
  int64 role_id = 1;
  repeated int64 menu_ids = 2;
}

message BindRolePermissionsReq {
  int64 role_id = 1;
  repeated string permission_codes = 2;
}

message GetRolePermissionsReq {
  int64 role_id = 1;
}

message ListAdminUsersReq {
  int32 page = 1;
  int32 size = 2;
}

message ListAdminUsersResp {
  repeated UserInfo list = 1;
  int64 total = 2;
}

message FreezeUserReq {
  int64 user_id = 1;
  int32 status = 2;
}

message AssignRoleReq {
  int64 user_id = 1;
  int64 role_id = 2;
}

message UpdateUserBalanceReq {
  int64 user_id = 1;
  double amount = 2;
}

message AssignUserRolesReq {
  int64 user_id = 1;
  repeated int64 role_ids = 2;
}

message GetUserRolesResp {
  repeated int64 role_ids = 1;
}

message ListMembersReq {
  int32 page = 1;
  int32 size = 2;
}

message ListMembersResp {
  repeated UserInfo list = 1;
  int64 total = 2;
}

message Menu {
  int64 id = 1;
  int64 parent_id = 2;
  string name = 3;
  string path = 4;
  string component = 5;
  int32 sort = 6;
  int32 type = 7;
}

message ListMenusResp {
  repeated Menu list = 1;
}

message LoginLog {
  int64 id = 1;
  int64 user_id = 2;
  string username = 3;
  string ip = 4;
  string user_agent = 5;
  string status = 6;
  string message = 7;
  string created_at = 8;
}

message QueryLoginLogsReq {
  int32 page = 1;
  int32 size = 2;
}

message QueryLoginLogsResp {
  repeated LoginLog list = 1;
  int64 total = 2;
}

service UserRpc {
  // Authentication & Session
  rpc Register(RegisterReq) returns (RegisterResp);
  rpc Login(LoginReq) returns (LoginResp);
  rpc LoginByCode(LoginByCodeReq) returns (LoginResp);
  rpc SendLoginCode(SendCodeReq) returns (BaseResp);
  rpc SendResetCode(SendCodeReq) returns (BaseResp);
  rpc ResetPassword(ResetPasswordReq) returns (BaseResp);
  rpc Logout(UserIDReq) returns (BaseResp);
  rpc ChangePassword(ChangePasswordReq) returns (BaseResp);
  rpc CheckToken(CheckTokenReq) returns (CheckTokenResp);
  
  // Profile & Face
  rpc GetProfile(UserIDReq) returns (UserInfo);
  rpc UpdateProfile(UpdateProfileReq) returns (BaseResp);
  rpc RegisterFace(RegisterFaceReq) returns (BaseResp);

  // RBAC Roles & Permissions
  rpc CreateRole(CreateRoleReq) returns (Role);
  rpc UpdateRole(UpdateRoleReq) returns (BaseResp);
  rpc DeleteRole(DeleteRoleReq) returns (BaseResp);
  rpc ListRoles(EmptyReq) returns (RoleListResp);
  rpc BindRoleMenu(BindRoleMenuReq) returns (BaseResp);
  rpc BindRolePermissions(BindRolePermissionsReq) returns (BaseResp);
  rpc GetRolePermissions(GetRolePermissionsReq) returns (PermissionListResp);
  rpc GetUserPermissions(UserIDReq) returns (PermissionListResp);
  rpc AssignUserRoles(AssignUserRolesReq) returns (BaseResp);
  rpc GetUserRoles(UserIDReq) returns (GetUserRolesResp);
  
  // Admin Operations
  rpc ListAdminUsers(ListAdminUsersReq) returns (ListAdminUsersResp);
  rpc FreezeUser(FreezeUserReq) returns (BaseResp);
  rpc AssignRole(AssignRoleReq) returns (BaseResp);
  rpc UpdateUserBalance(UpdateUserBalanceReq) returns (BaseResp);
  rpc ListMembers(ListMembersReq) returns (ListMembersResp);
  rpc ListPermissions(EmptyReq) returns (PermissionListResp);
  rpc ListMenus(EmptyReq) returns (ListMenusResp);
  
  // Audit Logs
  rpc QueryUserLoginLogs(QueryLoginLogsReq) returns (QueryLoginLogsResp);
  rpc QueryAdminLoginLogs(QueryLoginLogsReq) returns (QueryLoginLogsResp);
  
  // Points Management
  rpc UpdateUserPoints(UpdateUserPointsReq) returns (BaseResp);
  
  // Password Verification (no side effects)
  rpc VerifyPassword(VerifyPasswordReq) returns (VerifyPasswordResp);
}

message UpdateUserPointsReq {
  int64 user_id = 1;
  int32 points = 2;
}

message VerifyPasswordReq {
  int64 user_id = 1;
  string password = 2;
}

message VerifyPasswordResp {
  bool success = 1;
}

