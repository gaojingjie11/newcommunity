syntax = "proto3";

package workorder;
option go_package = "./workorder";

message BaseResp {
  int32 code = 1;
  string message = 2;
}

message WorkorderInfo {
  int64 id = 1;
  string type = 2;
  int64 user_id = 3;
  string category = 4;
  string description = 5;
  int32 status = 6;
  string result = 7;
  int64 processor_id = 8;
  string processed_at = 9;
  string created_at = 10;
  string user_name = 11;
  string user_mobile = 12;
}

message CreateWorkorderReq {
  int64 user_id = 1;
  string type = 2;
  string category = 3;
  string description = 4;
}

message ListWorkorderReq {
  int64 user_id = 1;
  int32 status = 2;
  int32 page = 3;
  int32 size = 4;
}

message WorkorderListResp {
  repeated WorkorderInfo list = 1;
  int64 total = 2;
}

message WorkorderLogInfo {
  int64 id = 1;
  string target_type = 2;
  int64 target_id = 3;
  int32 from_status = 4;
  int32 to_status = 5;
  int64 operator_id = 6;
  string action = 7;
  string remark = 8;
  string created_at = 9;
}

message GetLogsReq {
  int64 id = 1;
}

message LogListResp {
  repeated WorkorderLogInfo list = 1;
}

message ProcessWorkorderReq {
  int64 id = 1;
  int64 processor_id = 2;
  int32 status = 3;
  string result = 4;
  string remark = 5;
}

service WorkorderRpc {
  rpc CreateWorkorder(CreateWorkorderReq) returns (BaseResp);
  rpc ListMyWorkorders(ListWorkorderReq) returns (WorkorderListResp);
  rpc GetWorkorderLogs(GetLogsReq) returns (LogListResp);
  rpc AdminListWorkorders(ListWorkorderReq) returns (WorkorderListResp);
  rpc AdminProcessWorkorder(ProcessWorkorderReq) returns (BaseResp);
}
